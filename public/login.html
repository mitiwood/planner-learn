<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlannerAI · 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #0D0F1A;
  --bg2: #111420;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.09);
  --text: #F0F0F8;
  --text2: #8890AA;
  --text3: #50566A;
  --accent: #4F8EF7;
  --accent2: #7C3AED;
  --google: #FFFFFF;
  --kakao: #FEE500;
  --kakao-text: #191919;
  --naver: #03C75A;
  --naver-text: #FFFFFF;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Gmarket Sans', sans-serif;
  background: var(--bg1);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Animated gradient background */
.bg-orbs {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.18;
  animation: drift 12s ease-in-out infinite alternate;
}
.orb1 { width: 500px; height: 500px; background: #4F8EF7; top: -100px; left: -100px; animation-delay: 0s; }
.orb2 { width: 400px; height: 400px; background: #7C3AED; bottom: -80px; right: -80px; animation-delay: -4s; }
.orb3 { width: 300px; height: 300px; background: #06C755; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }
@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(30px, 20px) scale(1.08); }
}
.orb3 { animation-name: drift3; }
@keyframes drift3 {
  from { transform: translate(-50%,-50%) scale(1); }
  to   { transform: translate(calc(-50% + 20px), calc(-50% - 30px)) scale(1.1); }
}

/* Grid pattern */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

/* Main card */
.card-wrap {
  position: relative; z-index: 1;
  width: 440px;
  animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(40px); }
  to   { opacity:1; transform: translateY(0); }
}

.card {
  background: rgba(17,20,32,0.85);
  backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  padding: 44px 40px 40px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
}

/* Logo */
.logo-area { text-align: center; margin-bottom: 36px; }
.logo-mark {
  font-family: 'DM Mono', monospace;
  font-size: 28px; font-weight: 500;
  color: var(--text);
  letter-spacing: -1px;
}
.logo-mark .dot { color: var(--accent); }
.logo-mark .ai { 
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub {
  font-size: 13px; color: var(--text3); margin-top: 6px; font-weight: 300;
  letter-spacing: 0.3px;
}

/* Divider */
.divider { display: flex; align-items: center; gap: 12px; margin: 28px 0; }
.divider-line { flex: 1; height: 1px; background: var(--glass-border); }
.divider-text { font-size: 12px; color: var(--text3); }

/* Social buttons */
.social-btn {
  width: 100%; padding: 15px 20px;
  border-radius: 14px; border: 1.5px solid transparent;
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 15px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 12px; position: relative; overflow: hidden;
}
.social-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.08);
  opacity: 0; transition: opacity 0.2s;
}
.social-btn:hover::before { opacity: 1; }
.social-btn:active { transform: scale(0.98); }

.btn-google {
  background: #FFFFFF; color: #1F1F1F;
  border-color: rgba(0,0,0,0.1);
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.btn-google:hover { box-shadow: 0 4px 20px rgba(255,255,255,0.15); }

.btn-kakao {
  background: var(--kakao); color: var(--kakao-text);
  box-shadow: 0 2px 12px rgba(254,229,0,0.2);
}
.btn-kakao:hover { box-shadow: 0 4px 20px rgba(254,229,0,0.35); }

.btn-naver {
  background: var(--naver); color: var(--naver-text);
  box-shadow: 0 2px 12px rgba(3,199,90,0.2);
}
.btn-naver:hover { box-shadow: 0 4px 20px rgba(3,199,90,0.35); }

.social-icon { width: 22px; height: 22px; flex-shrink: 0; }

/* Google icon */
.google-svg { width: 20px; height: 20px; }

/* Feature pills */
.features {
  display: flex; gap: 8px; margin-top: 28px; justify-content: center; flex-wrap: wrap;
}
.feat-pill {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px; padding: 5px 12px;
  font-size: 11px; color: var(--text3); font-weight: 300;
}

/* Terms */
.terms {
  text-align: center; font-size: 11px; color: var(--text3);
  margin-top: 20px; line-height: 1.7; font-weight: 300;
}
.terms a { color: var(--accent); text-decoration: none; }

/* Loading overlay */
.loading-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(13,15,26,0.92);
  backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.loading-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.spinner {
  width: 48px; height: 48px; border-radius: 50%;
  border: 3px solid rgba(79,142,247,0.2);
  border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text2); }

/* Success overlay */
.success-overlay {
  position: fixed; inset: 0; z-index: 101;
  background: rgba(13,15,26,0.95);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.success-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
.success-icon { font-size: 56px; animation: pop 0.4s cubic-bezier(0.22,1,0.36,1); }
@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
.success-title { font-size: 22px; font-weight: 700; color: var(--text); }
.success-sub { font-size: 14px; color: var(--text2); }
.go-admin-btn {
  margin-top: 8px; padding: 14px 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white; border: none; border-radius: 14px;
  font-size: 15px; font-weight: 500; cursor: pointer;
  font-family: 'Gmarket Sans', sans-serif;
  transition: opacity 0.2s;
}
.go-admin-btn:hover { opacity: 0.88; }

/* User badge at top right after login */
.user-badge {
  position: fixed; top: 24px; right: 24px; z-index: 50;
  background: rgba(17,20,32,0.9); backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 50px; padding: 8px 16px 8px 10px;
  display: none; align-items: center; gap: 10px;
  animation: slideDown 0.4s ease;
}
.user-badge.show { display: flex; }
@keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
.user-avatar-placeholder { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; }
.user-name { font-size: 13px; color: var(--text); font-weight: 500; }
.logout-btn { font-size: 11px; color: var(--text3); cursor: pointer; margin-left: 4px; }
.logout-btn:hover { color: var(--text); }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- User badge (shown after login) -->
<div class="user-badge" id="userBadge">
  <div class="user-avatar-placeholder" id="userAvatar" style="background:#4F8EF7">👤</div>
  <span class="user-name" id="userName">사용자</span>
  <span class="logout-btn" onclick="logout()">로그아웃</span>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="logo-area">
      <div class="logo-mark">Planner<span class="dot">.</span><span class="ai">AI</span></div>
      <div class="logo-sub">기획자를 위한 AI 프롬프트 학습 플랫폼</div>
    </div>

    <div style="font-size:18px;font-weight:700;color:var(--text);text-align:center;margin-bottom:6px">
      시작하기
    </div>
    <div style="font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px;font-weight:300">
      소셜 계정으로 간편하게 로그인하세요
    </div>

    <!-- Google -->
    <button class="social-btn btn-google" onclick="socialLogin('google')">
      <svg class="google-svg" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 계속하기
    </button>

    <!-- Kakao -->
    <button class="social-btn btn-kakao" onclick="socialLogin('kakao')">
      <svg class="social-icon" viewBox="0 0 24 24" fill="#191919">
        <path d="M12 3C6.477 3 2 6.477 2 10.5c0 2.611 1.572 4.906 3.938 6.278-.174.633-.632 2.29-.723 2.646-.112.44.161.433.34.315.14-.093 2.226-1.51 3.127-2.12.42.062.849.096 1.318.096 5.523 0 10-3.477 10-7.5S17.523 3 12 3z"/>
      </svg>
      카카오로 계속하기
    </button>

    <!-- Naver -->
    <button class="social-btn btn-naver" onclick="socialLogin('naver')">
      <svg class="social-icon" viewBox="0 0 24 24" fill="white">
        <path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/>
      </svg>
      네이버로 계속하기
    </button>

    <div class="features">
      <span class="feat-pill">🔒 암호화 저장</span>
      <span class="feat-pill">⚡ 즉시 동기화</span>
      <span class="feat-pill">🆓 무료 체험</span>
    </div>

    <div class="terms">
      로그인 시 <a href="#">서비스 이용약관</a> 및 <a href="#">개인정보 처리방침</a>에<br>동의하는 것으로 간주됩니다.
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">로그인 중...</div>
</div>

<!-- Success overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon" id="successIcon">✅</div>
  <div class="success-title" id="successTitle">로그인 성공!</div>
  <div class="success-sub" id="successSub">환영합니다</div>
  <button class="go-admin-btn" onclick="goToAdmin()">관리자 페이지로 이동 →</button>
  <button onclick="goToApp()" style="background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Gmarket Sans',sans-serif;margin-top:4px">앱으로 이동</button>
</div>

<script>
const SOCIAL_CONFIG = {
  google: {
    name: 'Google',
    icon: '🔵',
    avatarBg: '#4285F4',
    fakeNames: ['김지수', '박민준', '이서연', '최준혁'],
    loadMsg: 'Google 계정으로 인증 중...'
  },
  kakao: {
    name: 'Kakao',
    icon: '🟡',
    avatarBg: '#FEE500',
    fakeNames: ['카카오유저', '플래너기획자', '기획마스터'],
    loadMsg: '카카오 계정으로 인증 중...'
  },
  naver: {
    name: 'Naver',
    icon: '🟢',
    avatarBg: '#03C75A',
    fakeNames: ['네이버PM', '기획자킴', '프로덕트리드'],
    loadMsg: '네이버 계정으로 인증 중...'
  }
};

let currentUser = null;

function socialLogin(provider) {
  const cfg = SOCIAL_CONFIG[provider];
  const overlay = document.getElementById('loadingOverlay');
  document.getElementById('loadingText').textContent = cfg.loadMsg;
  overlay.classList.add('show');

  // Simulate OAuth flow
  setTimeout(() => {
    overlay.classList.remove('show');

    const name = cfg.fakeNames[Math.floor(Math.random() * cfg.fakeNames.length)];
    currentUser = {
      name,
      provider,
      email: `${name.replace(/\s/g,'')}@${provider}.com`,
      role: 'admin',
      avatarBg: cfg.avatarBg,
      loginTime: new Date().toISOString()
    };

    // Store session
    sessionStorage.setItem('plannerUser', JSON.stringify(currentUser));

    showSuccess(cfg, name);
  }, 2000);
}

function showSuccess(cfg, name) {
  document.getElementById('successIcon').textContent = cfg.icon === '🔵' ? '✅' : cfg.icon;
  document.getElementById('successTitle').textContent = `${cfg.name} 로그인 성공!`;
  document.getElementById('successSub').textContent = `${name}님 환영합니다 🎉`;
  document.getElementById('successOverlay').classList.add('show');

  // Show user badge
  showUserBadge(name, cfg.avatarBg);
}

function showUserBadge(name, color) {
  const badge = document.getElementById('userBadge');
  document.getElementById('userAvatar').style.background = color;
  document.getElementById('userName').textContent = name;
  badge.classList.add('show');
}

function goToAdmin() {
  window.location.href = 'admin.html';
}
function goToApp() {
  window.location.href = 'planner-ai-onboarding.html';
}

function logout() {
  sessionStorage.removeItem('plannerUser');
  currentUser = null;
  document.getElementById('userBadge').classList.remove('show');
  document.getElementById('successOverlay').classList.remove('show');
}

// Check existing session
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('plannerUser');
  if (saved) {
    currentUser = JSON.parse(saved);
    showUserBadge(currentUser.name, currentUser.avatarBg);
  }
});
</script>
</body>
</html>
